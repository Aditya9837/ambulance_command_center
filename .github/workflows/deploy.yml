name: Deploy React App

on:
  push:
    branches:
      - main

env:
  VITE_API_URL: https://api.digiutkal.com/api
  VITE_WS_URL: wss://api.digiutkal.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.production
        env:
          API_URL: ${{ vars.VITE_API_URL }}
          WS_URL: ${{ vars.VITE_WS_URL }}
        run: |
          echo "VITE_API_URL=${API_URL:-https://api.digiutkal.com/api}" > .env.production
          echo "VITE_WS_URL=${WS_URL:-wss://api.digiutkal.com}" >> .env.production
          echo "Build-time .env.production:"
          cat .env.production

      - name: Build
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/html"

      - name: Fix dist folder
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cp -r /var/www/html/dist/* /var/www/html/
            rm -rf /var/www/html/dist
            sudo systemctl restart nginx
